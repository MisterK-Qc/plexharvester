<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <title>{{ t("login.title") }}</title>
</head>
<body class="page-login">
  <header><h1>{{ t("login.page_title") }}</h1></header>

  <main>
    {% if error %}<div class="warning-box">{{ error }}</div>{% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="form-vertical">
      <label for="username">{{ t("login.username") }}</label>
      <input id="username" name="username" type="text" autocomplete="username" required>

      <label for="password">{{ t("login.password") }}</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit" class="button-primary">{{ t("login.button") }}</button>
    </form>

    <p class="muted">{{ t("login.privacy_note") }}</p>
  </main>
</body>
</html>
